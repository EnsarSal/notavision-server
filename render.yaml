services:
  - type: web
    name: notavision-server
    env: python
    buildCommand: |
      apt-get update && apt-get install -y lilypond
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:10000 --timeout 180
    envVars:
      - key: OPENAI_API_KEY
        sync: false
